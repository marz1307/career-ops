# Portal Scanner Configuration — Example
#
# Copy this file to portals.yml in the project root and customize.
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (4 levels):
#   0. Local parser → per-company `parser:` script for SSR/static career pages (zero-token)
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. HTTP JSON (WebFetch) → per-company `api:` field
#   3. WebSearch / Bright Data SERP with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#   Prefer the BRANDED company careers URL whenever available; use ATS-hosted URL only as fallback.
#   ✅ https://careers.acme.com         ⚠️ https://acme.wd1.myworkdayjobs.com (fallback only)
#   ✅ https://openai.com/careers       ⚠️ https://job-boards.greenhouse.io/openai (fallback only)
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Location filter (optional) --
# Filter scanned jobs by location. Applied AFTER title filter, BEFORE dedup.
# If absent, all locations pass.
#
# Semantics (case-insensitive substring, in order):
#   - Empty location string on a job → pass
#   - Any `always_allow` keyword present → pass (takes precedence over `block`)
#   - Any `block` keyword present → reject
#   - `allow` empty → pass (already cleared block)
#   - `allow` non-empty → must match at least one keyword
#
# Example below targets UK + EU-broad remote. Customize to your geography.

# location_filter:
#   always_allow:
#     - "United Kingdom"
#     - "London"
#   allow:
#     - "Remote"
#     - "Hybrid"
#     - "United Kingdom"
#     - "UK"
#     - "EMEA"
#     - "Europe"
#     - "EU"
#     - "Netherlands"
#     - "Amsterdam"
#     - "Ireland"
#     - "Dublin"
#     - "France"
#     - "Paris"
#     - "Spain"
#     - "Madrid"
#     - "Barcelona"
#     - "Portugal"
#     - "Lisbon"
#     - "Sweden"
#     - "Denmark"
#   block:
#     - "India"
#     - "Bengaluru"
#     - "Hyderabad"
#     - "Singapore"
#     - "Hong Kong"
#     - "Tokyo"
#     - "Brazil"
#     - "Australia"

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).
# [CUSTOMIZE] Replace these with YOUR target role keywords.

title_filter:
  positive:
    # -- AI / ML roles --
    - "AI Engineer"
    - "ML Engineer"
    - "Machine Learning Engineer"
    - "LLM Engineer"
    - "Applied Scientist"
    - "Applied AI"
    - "Agent"
    - "Agentic"
    - "GenAI"
    - "Generative AI"
    - "NLP"
    - "LLMOps"
    - "MLOps"
    # -- Data roles --
    - "Data Engineer"
    - "Analytics Engineer"
    - "Data Scientist"
    - "Data Analyst"
    - "BI Engineer"
    - "BI Analyst"
    - "Business Intelligence Engineer"
    # -- Engineering roles --
    - "Backend Engineer"
    - "Platform Engineer"
    - "Solutions Architect"
    - "Solutions Engineer"
    - "Forward Deployed"
    - "Deployed Engineer"
    - "Customer Engineer"
    - "Integration Engineer"
    # -- Product roles --
    - "Product Manager"
    - "Technical PM"
    - "AI Product Manager"
  negative:
    # Below mid-level
    - "Intern"
    - "Internship"
    - "Apprentice"
    - "Trainee"
    # Wrong-tech / wrong-domain noise
    - ".NET"
    - "C#"
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby on Rails"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Solidity"
    - "Salesforce Admin"
    - "Salesforce Developer"
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"

# -- Search queries --
# Each query triggers a WebSearch / Bright Data SERP call.
# Use site: to filter by portal. Remove or disable queries that don't fit your search.

search_queries:

  # ============================================================
  # GLASSDOOR
  # ============================================================
  # Glassdoor SERP queries (free via Bright Data SERP / WebSearch).
  # For structured job-listing extraction, use the Bright Data dataset
  # block under `data_sources.bright_data_datasets` below.

  - name: Glassdoor UK — primary
    query: 'site:glassdoor.com/job-listing "Analytics Engineer" OR "Data Scientist" OR "AI Engineer" United Kingdom'
    enabled: true

  - name: Glassdoor US — primary
    query: 'site:glassdoor.com/job-listing "Analytics Engineer" OR "Data Scientist" OR "AI Engineer" United States'
    enabled: true

