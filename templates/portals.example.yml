# -- Bright Data datasets --
# For structured job-listing extraction from portals that block standard
# scraping (Glassdoor, LinkedIn, Indeed), call the Bright Data Datasets API
# with a job-listing dataset ID. The scanner posts a batch of JD URLs to
# the endpoint and reads back parsed records.
#
# Auth: bearer token read from `BRIGHTDATA_API_KEY` in `.env` — NEVER inline
# the token here. The example below uses an environment-variable placeholder.
#
# Reference (do NOT paste your key here):
#   curl -H "Authorization: Bearer $BRIGHTDATA_API_KEY" \
#        -H "Content-Type: application/json" \
#        -d '{"input":[{"url":"<glassdoor-jd-url>"}]}' \
#        "https://api.brightdata.com/datasets/v3/scrape?dataset_id=<dataset-id>&notify=false&include_errors=true"

data_sources:
  bright_data_datasets:
    - name: Glassdoor — job listings
      portal: Glassdoor
      endpoint: https://api.brightdata.com/datasets/v3/scrape
      dataset_id: gd_lpfbbndm1xnopbrcr0
      auth_env: BRIGHTDATA_API_KEY
      params:
        notify: false
        include_errors: true
      input_field: url
      notes: "Bright Data marketplace dataset for Glassdoor job listings. Returns parsed company, title, location, JD body, posted date."
      enabled: false   # flip to true once BRIGHTDATA_API_KEY is set in .env

    # Add more Bright Data datasets here as needed (LinkedIn jobs, Indeed, etc.).
